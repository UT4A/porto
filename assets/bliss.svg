      <stop offset="0" stop-color="#79c3ff"/>
      <stop offset="0.55" stop-color="#4aa0f0"/>
      <stop offset="1" stop-color="#2c6fca"/>
    </linearGradient>
    <linearGradient id="hill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#58c84b"/>
      <stop offset="0.55" stop-color="#2ba53a"/>
